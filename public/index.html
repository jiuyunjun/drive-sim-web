<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#091118" />
  <title>Drive Sim Web</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, "Microsoft YaHei", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(90, 165, 214, 0.16), transparent 38%),
        linear-gradient(180deg, #081017, #101c25 58%, #0c141b);
      color: #eef7ff;
    }

    .redirectCard {
      width: min(92vw, 420px);
      padding: 24px 22px;
      border-radius: 22px;
      background: rgba(8, 14, 20, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.28);
      text-align: center;
      backdrop-filter: blur(12px);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 22px;
    }

    p {
      margin: 0 0 18px;
      color: #bdd3e2;
      line-height: 1.5;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    a {
      color: #eef7ff;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.06);
    }
  </style>
  <script>
    (function redirectToPreferredLocale() {
      const languages = Array.isArray(navigator.languages) && navigator.languages.length
        ? navigator.languages
        : [navigator.language || 'en'];
      let locale = 'en';

      for (const language of languages) {
        const normalized = String(language || '').toLowerCase();
        if (normalized.startsWith('zh')) {
          locale = 'zh';
          break;
        }
        if (normalized.startsWith('ja')) {
          locale = 'ja';
          break;
        }
        if (normalized.startsWith('en')) {
          locale = 'en';
          break;
        }
      }

      const rootUrl = new URL('./', window.location.href);
      const targetUrl = new URL(`${locale}/index.html${window.location.search}${window.location.hash}`, rootUrl);
      window.location.replace(targetUrl.href);
    })();
  </script>
</head>
<body>
  <div class="redirectCard">
    <h1>Drive Sim Web</h1>
    <p>Redirecting to your preferred language…</p>
    <div class="links">
      <a href="./zh/index.html">中文</a>
      <a href="./en/index.html">English</a>
      <a href="./ja/index.html">日本語</a>
    </div>
  </div>
</body>
</html>
